<!DOCTYPE html>
<html>
<head>
    <title>System Monitor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>🔥 Real-Time System Monitor</h1>
        <p id="status">Loading...</p>
    </header>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>CPU Usage</h3>
            <p id="cpu" class="cpu">0%</p>
        </div>

        <div class="card">
            <h3>Memory</h3>
            <p id="memory" class="memory">0%</p>
        </div>

        <div class="card">
            <h3>Processes</h3>
            <p id="processes" class="process">0</p>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <h2>Processes</h2>

        <table>
            <thead>
                <tr>
                    <th>PID</th>
                    <th>Name</th>
                    <th>CPU</th>
                    <th>Memory</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="table"></tbody>
        </table>
    </div>

    <!-- 🔥 UPDATED CHART SECTION -->
    <div class="chart-container">
        <h2>Performance</h2>

        <div class="chart-grid">

            <div class="chart-box">
                <h3>CPU Usage</h3>
                <canvas id="cpuChart"></canvas>
            </div>

            <div class="chart-box">
                <h3>Memory Usage</h3>
                <canvas id="memoryChart"></canvas>
            </div>

        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
